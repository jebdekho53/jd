name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --schema=prisma/schema.prisma

      - name: Prisma schema validate
        run: pnpm exec prisma validate --schema=prisma/schema.prisma

      - name: Build API
        run: pnpm --filter @jebdekho/api run build

      - name: Unit tests (API)
        run: pnpm --filter @jebdekho/api exec jest --ci --passWithNoTests

  web:
    name: Web apps — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build buyer + merchant web
        run: |
          pnpm --filter @jebdekho/buyer-web run build
          pnpm --filter @jebdekho/merchant-web run build
