# Shared /uploads/ delivery policy — include INSIDE a `location /uploads/ {}`
# block that has already set `alias /var/www/jebdekho/uploads/;`.
#
# Uploads are UUID/content-addressed: replacing a product image writes a NEW
# file at a NEW URL and updates the DB, so a cached object is never stale for a
# path that still resolves. A 1-day browser/edge TTL plus a 7-day
# stale-while-revalidate window therefore offloads heavily without risking
# stale images. (If every upload subtree is guaranteed content-hashed you may
# switch to `public, max-age=31536000, immutable`.)
add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;

# Never let a browser or Cloudflare re-interpret an upload's MIME type. Combined
# with the active-type neutralisation below this stops stored-XSS via a file
# uploaded with an image extension but HTML/script body.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;

# No directory listings; correct MIME types come from /etc/nginx/mime.types.
# `alias` scoped to this location prevents path traversal, and nginx handles
# byte-range requests natively so videos / large PDFs resume correctly. Images,
# PDFs and legitimate attachments download / render normally.
autoindex off;
access_log off;
