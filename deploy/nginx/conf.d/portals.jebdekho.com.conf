# Template for portal subdomains — copy and adjust upstream port
# admin=3003 merchant=3002 rider=3004 vendor=3005 franchise=3006

upstream jebdekho_admin { server 127.0.0.1:3003; keepalive 8; }
upstream jebdekho_merchant { server 127.0.0.1:3002; keepalive 8; }
upstream jebdekho_rider { server 127.0.0.1:3004; keepalive 8; }
upstream jebdekho_vendor { server 127.0.0.1:3005; keepalive 8; }
upstream jebdekho_franchise { server 127.0.0.1:3006; keepalive 8; }

# --- admin.jebdekho.com ---
server {
    listen 80;
    server_name admin.jebdekho.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl http2;
    server_name admin.jebdekho.com;
    ssl_certificate /etc/letsencrypt/live/admin.jebdekho.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.jebdekho.com/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000" always;
    location /_next/static/ {
        proxy_pass http://jebdekho_admin;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
    location / {
        limit_req zone=web_limit burst=80 nodelay;
        proxy_pass http://jebdekho_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

