upstream jebdekho_buyer {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name jebdekho.com www.jebdekho.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://jebdekho.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.jebdekho.com;

    ssl_certificate /etc/letsencrypt/live/jebdekho.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jebdekho.com/privkey.pem;

    return 301 https://jebdekho.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jebdekho.com;

    ssl_certificate /etc/letsencrypt/live/jebdekho.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jebdekho.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Google Search Console site verification. Served directly from buyer-web's
    # public/ dir so it stays reachable independent of the Next.js process.
    location = /googlee063f0df11e3cf46.html {
        alias /var/www/jebdekho/apps/buyer-web/public/googlee063f0df11e3cf46.html;
        default_type text/html;
        access_log off;
    }

    # Serve Next.js build assets directly. Missing stale chunks must be 404s,
    # not proxied Next.js HTML responses that trigger strict MIME failures.
    location /_next/static/ {
        alias /var/www/jebdekho/.next-static/buyer-web/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        expires 1y;
        access_log off;
    }

    location / {
        limit_req zone=web_limit burst=100 nodelay;
        proxy_pass http://jebdekho_buyer;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
