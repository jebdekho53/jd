user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    client_max_body_size 25M;
    client_body_buffer_size 128k;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # gzip for text-like payloads only. Images/video/archives are already
    # compressed and are intentionally excluded (no double-compression). Brotli
    # is NOT configured here; if a brotli module is later added, disable this or
    # scope it to avoid duplicate-encoding conflicts.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml application/rss+xml application/manifest+json
        text/javascript image/svg+xml;

    # Security headers (applied in each server block via snippet)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Force potentially-active uploads (SVG/HTML/XML) to download as inert
    # attachments so they can never execute as active content in our origin.
    # Empty value ⇒ nginx omits the header, so images/PDFs render/download
    # normally. Used by the /uploads/ location.
    map $uri $upload_content_disposition {
        default            "";
        ~*\.(svgz?|html?|xht|xhtml|xml)$   "attachment";
    }

    # Cloudflare real client IP restoration. Trusts CF-Connecting-IP ONLY from
    # official Cloudflare ranges. Regenerate the ranges with
    # deploy/scripts/update-cloudflare-ips.sh. Safe to include before Cloudflare
    # is switched on: with no CF traffic these directives simply never match.
    include /etc/nginx/snippets/cloudflare-real-ip.conf;

    include /etc/nginx/conf.d/*.conf;
}
