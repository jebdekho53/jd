services:
  postgres:
    image: postgres:16-alpine
    container_name: jebdekho-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jebdekho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jebdekho_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-jebdekho}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jebdekho} -d ${POSTGRES_DB:-jebdekho}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jebdekho-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: jebdekho-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-jebdekho_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-jebdekho_minio_secret}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: jebdekho-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-jebdekho_minio} $${MINIO_ROOT_PASSWORD:-jebdekho_minio_secret};
      mc mb local/jebdekho-uploads --ignore-existing;
      mc anonymous set download local/jebdekho-uploads/public;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-jebdekho_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-jebdekho_minio_secret}

  mailhog:
    image: mailhog/mailhog:latest
    container_name: jebdekho-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    profiles:
      - mail

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: jebdekho-network
